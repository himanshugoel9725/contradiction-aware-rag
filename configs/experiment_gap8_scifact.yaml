experiment_name: experiment_gap8_scifact
description: "Gap 8 — Cross-dataset generalisation. Strategy C on SciFact (gold documents, no retrieval)."

dataset:
  name: scifact_contradiction_pairs
  path: data_processed/scifact_contradiction_pairs.jsonl
  max_examples: null
  seed: 42

retrieval:
  strategy: hybrid
  top_k: 5
  bm25_weight: 0.5
  embedding_weight: 0.5

pipeline:
  pico_extraction: true
  stance_classification: true
  contradiction_aware_selection: true
  evidence_quality_tagging: true
  structured_synthesis: true
  postcheck_verification: true

generation:
  strategy: C
  model_task_type: generation

evaluation:
  compute_metrics: true
  bootstrap_resamples: 1000

budget:
  max_minutes: 180
  cost_alert_every_n_calls: 50
